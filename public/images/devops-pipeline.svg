<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#pipelineGradient)" opacity="0.1"/>
  
  <!-- Pipeline Flow Line -->
  <path d="M50 200 Q300 180 550 200 Q800 220 1150 200" stroke="url(#pipelineGradient)" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Stage 1: Source Control -->
  <g transform="translate(80, 150)">
    <rect width="120" height="80" rx="10" fill="url(#boxGradient)" opacity="0.7" filter="url(#glow)"/>
    <rect width="120" height="80" rx="10" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">SOURCE</text>
    <text x="60" y="50" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">CONTROL</text>
    <circle cx="30" cy="25" r="8" fill="#00d4ff" opacity="0.8"/>
    <circle cx="90" cy="55" r="6" fill="#00ffff" opacity="0.6"/>
  </g>
  
  <!-- Stage 2: Build -->
  <g transform="translate(280, 120)">
    <rect width="100" height="100" rx="10" fill="url(#boxGradient)" opacity="0.7" filter="url(#glow)"/>
    <rect width="100" height="100" rx="10" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="50" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">BUILD</text>
    <text x="50" y="55" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">&amp; TEST</text>
    <rect x="20" y="20" width="60" height="8" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <rect x="20" y="70" width="40" height="6" rx="3" fill="#00d4ff" opacity="0.6"/>
  </g>
  
  <!-- Stage 3: Deploy -->
  <g transform="translate(450, 140)">
    <rect width="110" height="90" rx="10" fill="url(#boxGradient)" opacity="0.7" filter="url(#glow)"/>
    <rect width="110" height="90" rx="10" fill="none" stroke="#ff6b35" stroke-width="2"/>
    <text x="55" y="35" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">DEPLOY</text>
    <text x="55" y="50" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">STAGING</text>
    <circle cx="25" cy="25" r="5" fill="#ff6b35" opacity="0.8"/>
    <circle cx="55" cy="70" r="7" fill="#00d4ff" opacity="0.6"/>
    <circle cx="85" cy="45" r="4" fill="#8b5cf6" opacity="0.7"/>
  </g>
  
  <!-- Stage 4: Production -->
  <g transform="translate(620, 110)">
    <rect width="130" height="110" rx="10" fill="url(#boxGradient)" opacity="0.7" filter="url(#glow)"/>
    <rect width="130" height="110" rx="10" fill="none" stroke="#00ffff" stroke-width="2"/>
    <text x="65" y="40" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">PRODUCTION</text>
    <text x="65" y="55" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">DEPLOYMENT</text>
    <rect x="20" y="25" width="90" height="10" rx="5" fill="#00ffff" opacity="0.8"/>
    <rect x="30" y="75" width="70" height="8" rx="4" fill="#ff6b35" opacity="0.6"/>
    <circle cx="100" cy="30" r="6" fill="#8b5cf6" opacity="0.7"/>
  </g>
  
  <!-- Stage 5: Monitoring -->
  <g transform="translate(820, 160)">
    <rect width="120" height="80" rx="10" fill="url(#boxGradient)" opacity="0.7" filter="url(#glow)"/>
    <rect width="120" height="80" rx="10" fill="none" stroke="#34d399" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">MONITOR</text>
    <text x="60" y="50" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="12" font-weight="600">&amp; FEEDBACK</text>
    <circle cx="30" cy="60" r="5" fill="#34d399" opacity="0.8"/>
    <circle cx="90" cy="25" r="4" fill="#00d4ff" opacity="0.6"/>
  </g>
  
  <!-- Connecting Arrows -->
  <g stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6">
    <path d="M200 190 L280 170"/>
    <path d="M380 170 L450 185"/>
    <path d="M560 185 L620 165"/>
    <path d="M750 165 L820 200"/>
  </g>
  
  <!-- Arrow heads -->
  <g fill="#00d4ff" opacity="0.6">
    <polygon points="275,165 285,170 275,175"/>
    <polygon points="445,180 455,185 445,190"/>
    <polygon points="615,160 625,165 615,170"/>
    <polygon points="815,195 825,200 815,205"/>
  </g>
  
  <!-- DevOps Symbol -->
  <g transform="translate(1000, 170)">
    <circle cx="50" cy="30" r="25" fill="none" stroke="url(#boxGradient)" stroke-width="3" opacity="0.8"/>
    <path d="M30 30 Q50 10 70 30 Q50 50 30 30" fill="url(#boxGradient)" opacity="0.6"/>
    <text x="50" y="70" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="10" font-weight="600">DevOps</text>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="150" cy="80" r="2" fill="#00d4ff">
      <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="300" r="1.5" fill="#8b5cf6">
      <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="70" r="2.5" fill="#ff6b35">
      <animate attributeName="cy" values="70;50;70" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="320" r="2" fill="#00ffff">
      <animate attributeName="cy" values="320;300;320" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>